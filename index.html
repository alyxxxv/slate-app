<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gray-1:oklch(98% 0.004 80);--gray-2:oklch(96.5% 0.005 80);--gray-3:oklch(94% 0.006 80);
  --gray-4:oklch(91% 0.007 80);--gray-5:oklch(86% 0.008 80);--gray-6:oklch(72% 0.010 80);
  --gray-7:oklch(56% 0.010 80);--gray-8:oklch(38% 0.010 80);--gray-9:oklch(22% 0.010 80);
  --bg:var(--gray-1);--surface:var(--gray-2);--surface-hover:var(--gray-3);--surface-active:var(--gray-4);
  --border:var(--gray-5);--border-strong:var(--gray-6);
  --fg-1:var(--gray-9);--fg-2:var(--gray-8);--fg-3:var(--gray-7);--fg-4:var(--gray-6);
  --accent:oklch(48% 0.045 250);--accent-soft:oklch(94% 0.020 250);
  --danger:oklch(50% 0.140 25);--danger-soft:oklch(95% 0.030 25);
  --font-serif:"Newsreader","Times New Roman",Georgia,serif;
  --font-sans:"Inter Tight","Inter",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",monospace;
  --sidebar-w:240px;--topbar-h:48px;--content-max:720px;
  --r-sm:4px;--r-md:8px;--r-lg:12px;
  --shadow-2:0 8px 24px rgb(0 0 0/.08),0 2px 6px rgb(0 0 0/.05);
  --dur:160ms;--ease:cubic-bezier(0.2,0,0,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);color:var(--fg-2);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit}
::selection{background:var(--accent-soft);color:var(--fg-1)}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;transition:grid-template-columns var(--dur) var(--ease)}
.app.collapsed{grid-template-columns:44px 1fr}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.sidebar.is-collapsed{align-items:center;padding-top:12px}
.sb-brand{display:flex;align-items:center;gap:10px;padding:0 14px;height:var(--topbar-h);border-bottom:1px solid var(--border);color:var(--fg-1);flex-shrink:0}
.sb-brand .logo-name{font-family:var(--font-serif);font-size:18px;font-weight:500;letter-spacing:-0.012em;flex:1}
.sb-toggle-btn{display:flex;align-items:center;justify-content:center;padding:6px;border-radius:var(--r-sm);color:var(--fg-3);transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.sb-toggle-btn:hover{background:var(--surface-hover);color:var(--fg-1)}
.sb-search{padding:10px 10px 4px;flex-shrink:0}
.sb-search-wrap{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.sb-search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.sb-search-wrap input{flex:1;font-size:13px}
.sb-search-wrap input::placeholder{color:var(--fg-4)}
.sb-eyebrow{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);padding:12px 14px 5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sb-eyebrow button{padding:3px;border-radius:3px;color:var(--fg-3)}
.sb-eyebrow button:hover{background:var(--surface-hover);color:var(--fg-1)}
.sb-list{flex:1;overflow-y:auto;padding:2px 8px 10px;display:flex;flex-direction:column;gap:1px}
.sb-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r-sm);cursor:pointer;position:relative;transition:background var(--dur) var(--ease)}
.sb-row:hover{background:var(--surface-hover)}
.sb-row.active{background:var(--accent-soft)}
.sb-row.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--accent);border-radius:2px}
.glyph{width:20px;height:20px;border-radius:3px;background:var(--gray-4);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:12px;font-weight:500;color:var(--fg-2);flex-shrink:0}
.sb-row .sname{flex:1;font-size:13px;font-weight:500;color:var(--fg-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-row .scount{font-size:12px;color:var(--fg-3)}
.sb-foot{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:9px;color:var(--fg-3);font-size:13px;flex-shrink:0}
.sb-empty{padding:16px 12px;font-size:13px;color:var(--fg-3);font-style:italic;font-family:var(--font-serif)}
.main{display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg)}
.topbar{height:var(--topbar-h);flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px}
.topbar .crumb{display:flex;align-items:baseline;gap:10px;flex:1;min-width:0}
.topbar .t-subject{font-family:var(--font-serif);font-size:17px;font-weight:500;color:var(--fg-1);letter-spacing:-0.012em;flex-shrink:0}
.topbar .t-meta{font-size:12px;color:var(--fg-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .actions{display:flex;gap:6px;flex-shrink:0}
.pane{flex:1;overflow:auto;display:flex}
.btn{font-family:var(--font-sans);font-size:13px;font-weight:500;padding:6px 11px;border-radius:var(--r-sm);border:1px solid transparent;line-height:1;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:background var(--dur) var(--ease)}
.btn svg{width:13px;height:13px;stroke-width:1.5}
.btn-primary{background:var(--fg-1);color:var(--bg)}
.btn-primary:hover{background:var(--gray-8)}
.btn-ghost{background:transparent;color:var(--fg-2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-hover);color:var(--fg-1)}
.btn-icon{padding:5px;border-radius:var(--r-sm);color:var(--fg-3);display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{background:var(--surface-hover);color:var(--fg-1)}
.btn-icon svg{width:16px;height:16px;stroke-width:1.5}
.entry-shell{display:grid;grid-template-columns:220px 1fr;gap:28px;width:100%;max-width:1040px;padding:28px 22px 80px;align-items:start}
.filter-rail{position:sticky;top:0;display:flex;flex-direction:column;gap:20px;font-family:var(--font-sans)}
.fr-section{display:flex;flex-direction:column;gap:7px}
.fr-eyebrow{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3)}
.fr-search{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.fr-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.fr-search input{flex:1;font-size:13px;min-width:0}
.fr-search input::placeholder{color:var(--fg-4)}
.fr-search svg{color:var(--fg-4);flex-shrink:0;width:13px;height:13px}
.fr-search .fr-clr{color:var(--fg-3);padding:2px;border-radius:3px;display:inline-flex}
.fr-search .fr-clr:hover{background:var(--surface-hover);color:var(--fg-1)}
.fr-opts{display:flex;flex-direction:column;gap:1px}
.fr-opt{text-align:left;font-size:13px;color:var(--fg-2);padding:5px 9px;border-radius:var(--r-sm);position:relative;transition:background var(--dur) var(--ease)}
.fr-opt:hover{background:var(--surface-hover);color:var(--fg-1)}
.fr-opt.active{background:var(--accent-soft);color:var(--gray-9);font-weight:500}
.fr-opt.active::before{content:"";position:absolute;left:0;top:5px;bottom:5px;width:2px;background:var(--accent);border-radius:2px}
.fr-tags{display:flex;flex-wrap:wrap;gap:4px}
.fr-tag{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--fg-2);padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.fr-tag .hash{color:var(--fg-3)}
.fr-tag .n{color:var(--fg-3);font-size:11px;margin-left:1px}
.fr-tag:hover{background:var(--surface-hover);border-color:var(--border-strong)}
.fr-tag.active{background:var(--accent-soft);border-color:var(--accent);color:var(--gray-9)}
.fr-tag.active .hash{color:var(--accent)}
.fr-foot{border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:5px}
.fr-count{font-size:12px;color:var(--fg-3)}
.fr-count strong{color:var(--fg-1);font-weight:600}
.fr-clear-all{align-self:flex-start;font-size:12px;color:var(--accent);text-decoration:underline;text-decoration-color:var(--border-strong);text-underline-offset:.2em}
.fr-clear-all:hover{text-decoration-color:var(--accent)}
.entry-pane{min-width:0}
.day-group+.day-group{margin-top:28px}
.day-eyebrow{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 22px;cursor:pointer;transition:background var(--dur) var(--ease)}
.entry-card+.entry-card{margin-top:9px}
.entry-card:hover{background:var(--surface-hover)}
.ec-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px}
.ec-date{font-size:13px;color:var(--fg-3);white-space:nowrap}
.ec-more{color:var(--fg-3);padding:3px;border-radius:3px;display:inline-flex}
.ec-more:hover{background:var(--bg);color:var(--fg-1)}
.ec-title{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--fg-1);letter-spacing:-0.012em;margin-bottom:5px;line-height:1.3}
.ec-body{font-family:var(--font-serif);font-size:14px;line-height:1.6;color:var(--fg-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}
.ec-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--fg-3);padding:2px 7px;background:var(--bg);border:1px solid var(--border);border-radius:999px;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.ec-tag .hash{color:var(--fg-4);margin-right:1px}
.ec-tag:hover{background:var(--surface-hover);color:var(--fg-1)}
.ec-tag.active{background:var(--accent-soft);border-color:var(--accent);color:var(--gray-9)}
.ec-tag.active .hash{color:var(--accent)}
.ec-footer{display:flex;gap:8px;margin-top:8px;font-size:12px;color:var(--fg-3)}
.hl{background:var(--accent-soft);color:var(--fg-1);border-radius:2px;padding:0 1px}
.filter-empty{margin:40px 0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.filter-empty .fe-ttl{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--fg-1);letter-spacing:-0.012em}
.filter-empty .fe-sub{font-family:var(--font-serif);font-size:14px;color:var(--fg-3)}
.editor-wrap{width:100%;max-width:var(--content-max);padding:32px 24px 80px;margin:0 auto}
.editor-meta{display:flex;gap:14px;align-items:baseline;margin-bottom:14px}
.editor-eyebrow{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3)}
.editor-date{font-size:13px;color:var(--fg-3)}
.editor-saved{margin-left:auto;font-size:12px;color:var(--fg-3);transition:opacity var(--dur) var(--ease)}
.editor-title{width:100%;font-family:var(--font-serif);font-size:27px;font-weight:500;letter-spacing:-0.012em;color:var(--fg-1);padding:4px 0;margin-bottom:10px;line-height:1.25;border-bottom:1px solid transparent;transition:border-color var(--dur) var(--ease)}
.editor-title:focus{border-bottom-color:var(--border);outline:none}
.editor-title::placeholder{color:var(--fg-4)}
.editor-tags{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:14px;min-height:28px}
.ed-tag{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--fg-2);padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:999px}
.ed-tag .hash{color:var(--fg-3)}
.ed-tag .rm{color:var(--fg-4);margin-left:2px;font-size:13px;line-height:1;padding:0 1px;border-radius:2px}
.ed-tag .rm:hover{color:var(--danger)}
.ed-tag-input{font-size:12px;color:var(--fg-1);min-width:70px;border-bottom:1px dashed var(--border);padding:2px 0;outline:none;background:none}
.ed-tag-input::placeholder{color:var(--fg-4)}
.ed-tag-hint{font-size:11px;color:var(--fg-4);margin-left:2px}
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:5px 6px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;position:sticky;top:0;z-index:5}
.tb-btn{width:28px;height:28px;border-radius:var(--r-sm);color:var(--fg-2);display:inline-flex;align-items:center;justify-content:center;transition:background var(--dur) var(--ease)}
.tb-btn:hover{background:var(--surface-hover);color:var(--fg-1)}
.tb-btn:active{background:var(--surface-active)}
.tb-sep{width:1px;height:17px;background:var(--border);margin:0 3px;flex-shrink:0}
.tb-glyph{font-size:13px;line-height:1;font-family:var(--font-sans)}
.editor-body{font-family:var(--font-serif);font-size:17px;line-height:1.65;color:var(--fg-2);outline:none;min-height:50vh;caret-color:var(--accent)}
.editor-body:empty::before{content:attr(data-ph);color:var(--fg-4);pointer-events:none}
.editor-body p{margin:0 0 .6em}
.editor-body h2{font-family:var(--font-serif);font-size:22px;font-weight:500;color:var(--fg-1);letter-spacing:-0.012em;margin:1.1em 0 .4em;line-height:1.3}
.editor-body ul,.editor-body ol{margin:.4em 0;padding-left:1.6em}
.editor-body li{margin:.15em 0}
.editor-body blockquote{margin:.8em 0;padding:4px 0 4px 16px;border-left:2px solid var(--border-strong);color:var(--fg-3);font-style:italic}
.editor-body a{color:var(--fg-1);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:.18em}
.editor-body code{font-family:var(--font-mono);font-size:.88em;background:var(--surface);border:1px solid var(--border);padding:.05em .35em;border-radius:3px;color:var(--fg-1)}
.editor-body pre{font-family:var(--font-mono);font-size:13px;line-height:1.55;background:var(--gray-9);color:var(--gray-1);padding:14px 16px;border-radius:6px;margin:.8em 0;overflow-x:auto;position:relative;white-space:pre}
.editor-body pre code{background:none;border:none;padding:0;color:inherit;font-size:inherit}
.code-copy{position:absolute;top:8px;right:8px;font-family:var(--font-sans);font-size:11px;font-weight:500;color:var(--gray-3);background:oklch(100% 0 0/.08);border:1px solid oklch(100% 0 0/.12);padding:3px 8px;border-radius:4px;cursor:pointer}
.code-copy:hover{background:oklch(100% 0 0/.18);color:var(--gray-1)}
.editor-actions{display:flex;justify-content:flex-end;padding-top:12px;position:sticky;bottom:0}
.pane-empty{flex:1;display:flex;align-items:center;justify-content:center}
.empty-inner{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:40px;max-width:460px}
.empty-inner .e-ttl{font-family:var(--font-serif);font-size:21px;font-weight:500;color:var(--fg-1);letter-spacing:-0.012em}
.empty-inner .e-sub{font-family:var(--font-serif);font-size:15px;color:var(--fg-3);max-width:40ch;line-height:1.55}
.no-subject{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:15px;color:var(--fg-4)}
.scrim{position:fixed;inset:0;background:oklch(20% 0 0/.4);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-2);padding:26px;width:370px;display:flex;flex-direction:column;gap:14px}
.modal h2{font-family:var(--font-serif);font-size:19px;font-weight:500;letter-spacing:-0.012em;color:var(--fg-1)}
.modal .m-field{display:flex;flex-direction:column;gap:6px}
.modal label{font-size:12px;color:var(--fg-3);font-weight:500}
.modal input{font-size:14px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--fg-1);outline:none;transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.modal input:focus{border-color:var(--accent);background:var(--bg);box-shadow:0 0 0 2px var(--accent-soft)}
.modal input::placeholder{color:var(--fg-4)}
.modal .m-row{display:flex;gap:8px;justify-content:flex-end}
</style>

<body>
<div id="root"></div>
<script>
const STORAGE_KEY = "slate_v1";

// ---- Seed ----
const today = new Date();
const day = n => { const d=new Date(today); d.setDate(d.getDate()-n); d.setHours(10,0,0,0); return d.toISOString(); };
const SEED = [
  { id:"linalg", name:"Linear algebra", entries:[
    { id:"e1", date:day(0), title:"Eigenvectors finally clicked", tags:["algebra","eigen"],
      body:"An eigenvector is a direction the transformation leaves alone — only the length scales by the eigenvalue. Drew this out for a 2×2 shear and the math suddenly stopped feeling like notation." },
    { id:"e2", date:day(1), title:"Determinants as area scaling", tags:["algebra","geometry"],
      body:"det(A) is how much the unit square stretches under A. Negative determinant means orientation flipped." },
    { id:"e3", date:day(3), title:"Row reduction, slowly", tags:["algebra","practice"],
      body:"Worked through three systems by hand. The point of RREF isn't the answer — it's making the structure of the solution space visible." },
  ]},
  { id:"spanish", name:"Spanish", entries:[
    { id:"s1", date:day(0), title:"Pretérito vs imperfecto", tags:["grammar","past-tense"],
      body:"Pretérito = a discrete completed action. Imperfecto = an ongoing background state, or a habit." },
    { id:"s2", date:day(4), title:"Subjunctive triggers", tags:["grammar"],
      body:"Espero que, ojalá que, dudo que. The subjunctive lives in the second clause, after the trigger." },
  ]},
  { id:"react", name:"React", entries:[
    { id:"r1", date:day(1), title:"useEffect dependency arrays", tags:["hooks"],
      body:"Every value from component scope used inside the effect must appear in deps. The lint rule is right almost always." },
  ]},
];

// ---- Storage (localStorage) ----
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return null;
}
function saveData(subjects) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(subjects)); } catch(_) {}
}

// ---- Helpers ----
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmtDate(iso) { const d=new Date(iso); return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function dayBucket(iso) {
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(iso); d.setHours(0,0,0,0);
  const diff=Math.round((t-d)/86400000);
  if(diff===0) return "Today"; if(diff===1) return "Yesterday";
  if(diff<7) return "This week"; return "Earlier";
}
function wc(s){ return (s||"").replace(/<[^>]+>/g," ").trim().split(/\s+/).filter(Boolean).length; }
function readMin(s){ return Math.max(1,Math.round(wc(s)/200)); }
function passesDate(iso,range){
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(iso);d.setHours(0,0,0,0);
  const diff=Math.round((t-d)/86400000);
  if(range==="any") return true; if(range==="today") return diff===0;
  if(range==="week") return diff<7; if(range==="month") return diff<30;
  if(range==="older") return diff>=30; return true;
}
function escHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function esc(s){ return escHtml(s); }
function highlight(html,q){
  if(!q) return html;
  return html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi"), '<mark class="hl">$1</mark>');
}
function snippetText(txt,q,max=180){
  const plain=txt.replace(/<[^>]+>/g," ");
  if(!q) return plain.slice(0,max)+(plain.length>max?"…":"");
  const idx=plain.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return plain.slice(0,max)+(plain.length>max?"…":"");
  const s=Math.max(0,idx-40),e=Math.min(plain.length,idx+q.length+max-40);
  return (s>0?"…":"")+plain.slice(s,e)+(e<plain.length?"…":"");
}

// ---- State ----
let state = {
  subjects:[], activeSubjectId:null, activeEntryId:null,
  sidebarCollapsed:false, subjectQuery:"",
  entryFilter:"", dateRange:"any", activeTags:[], view:"list"
};

function init() {
  const saved = loadData();
  state.subjects = saved || SEED;
  if(state.subjects.length) state.activeSubjectId = state.subjects[0].id;
  render();
}

let saveTimer, statusFade;
function saveDebounced(immediate) {
  clearTimeout(saveTimer);
  if(immediate) { saveData(state.subjects); return; }
  saveTimer = setTimeout(()=>saveData(state.subjects), 600);
}

// ---- Render ----
function render() { renderSidebar(); renderTopbar(); renderContent(); }

function renderSidebar() {
  const app=document.getElementById("app");
  app.classList.toggle("collapsed",state.sidebarCollapsed);
  const sb=document.getElementById("sidebar");
  sb.classList.toggle("is-collapsed",state.sidebarCollapsed);
  if(state.sidebarCollapsed){
    sb.innerHTML=`<button class="sb-toggle-btn" id="sbToggle">${iSVG("panel-left",16)}</button>`;
    sb.querySelector("#sbToggle").onclick=()=>{state.sidebarCollapsed=false;render();};
    return;
  }
  const q=state.subjectQuery.toLowerCase();
  const filtered=state.subjects.filter(s=>s.name.toLowerCase().includes(q));
  sb.innerHTML=`
    <div class="sb-brand">${iSVG("file-text",17)}<span class="logo-name">Slate</span>
      <button class="sb-toggle-btn" id="sbToggle">${iSVG("panel-left",14)}</button></div>
    <div class="sb-search"><div class="sb-search-wrap">${iSVG("search",13)}
      <input id="sbSearch" placeholder="Search subjects" value="${esc(state.subjectQuery)}"></div></div>
    <div class="sb-eyebrow"><span>Subjects</span><button id="addSubjectBtn">${iSVG("plus",14)}</button></div>
    <div class="sb-list">${filtered.length===0
      ?`<div class="sb-empty">No subjects match "${esc(state.subjectQuery)}".</div>`
      :filtered.map(s=>{
        const cnt=s.entries.length, active=s.id===state.activeSubjectId;
        return `<div class="sb-row${active?" active":""}" data-sid="${s.id}">
          <div class="glyph">${s.name[0].toUpperCase()}</div>
          <span class="sname">${esc(s.name)}</span>
          <span class="scount">${cnt}</span></div>`;
      }).join("")
    }</div>
    <div class="sb-foot">${iSVG("settings",13)} <span>Settings</span></div>`;
  sb.querySelector("#sbToggle").onclick=()=>{state.sidebarCollapsed=true;render();};
  sb.querySelector("#sbSearch").oninput=e=>{state.subjectQuery=e.target.value;renderSidebar();};
  sb.querySelector("#addSubjectBtn").onclick=openModal;
  sb.querySelectorAll(".sb-row").forEach(el=>{
    el.onclick=()=>{state.activeSubjectId=el.dataset.sid;state.activeEntryId=null;state.view="list";resetFilters();render();};
  });
}

function renderTopbar() {
  const subj=activeSubject(), tb=document.getElementById("topbar");
  if(!subj){tb.innerHTML=`<div class="crumb"><span class="t-subject">Slate</span></div>`;return;}
  const oldest=subj.entries.length?subj.entries.reduce((a,b)=>new Date(a.date)<new Date(b.date)?a:b):null;
  const meta=`${subj.entries.length} ${subj.entries.length===1?"entry":"entries"}${oldest?" · Started "+fmtDate(oldest.date):""}`;
  tb.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px">
      ${state.view==="editor"?`<button class="btn-icon" id="backBtn">${iSVG("chevron-left",16)}</button>`:""}
    </div>
    <div class="crumb"><span class="t-subject">${esc(subj.name)}</span><span class="t-meta">${meta}</span></div>
    <div class="actions">
      <button class="btn btn-ghost">${iSVG("archive",13)} Archive</button>
      ${state.view==="list"?`<button class="btn btn-primary" id="newEntryBtn">${iSVG("plus",13)} New entry</button>`:""}
    </div>`;
  tb.querySelector("#backBtn")?.addEventListener("click",()=>{state.view="list";state.activeEntryId=null;render();});
  tb.querySelector("#newEntryBtn")?.addEventListener("click",newEntry);
}

function renderContent() {
  const pane=document.getElementById("pane"), subj=activeSubject();
  if(!subj){pane.innerHTML=`<div class="no-subject">Select a subject to start.</div>`;return;}
  if(state.view==="editor"){renderEditor(pane,subj);return;}
  if(subj.entries.length===0){
    pane.innerHTML=`<div class="pane-empty"><div class="empty-inner">
      <p class="e-ttl">Nothing here yet.</p>
      <p class="e-sub">Start typing to make your first entry for <em>${esc(subj.name)}</em>.</p>
      <button class="btn btn-primary" id="newEntryEmpty">${iSVG("plus",13)} New entry</button>
    </div></div>`;
    pane.querySelector("#newEntryEmpty").onclick=newEntry; return;
  }
  renderEntryList(pane,subj);
}

function renderEntryList(pane,subj) {
  const q=state.entryFilter.trim();
  const filtered=subj.entries.filter(e=>{
    if(q&&!(e.title+" "+e.body).toLowerCase().includes(q.toLowerCase())) return false;
    if(!passesDate(e.date,state.dateRange)) return false;
    if(state.activeTags.length>0&&!state.activeTags.every(t=>(e.tags||[]).includes(t))) return false;
    return true;
  });
  const hasFilters=q||state.dateRange!=="any"||state.activeTags.length>0;
  const tagCounts={};
  subj.entries.forEach(e=>(e.tags||[]).forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;}));
  const tags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);
  const groups={};
  filtered.forEach(e=>{const b=q?"Matches":dayBucket(e.date);(groups[b]=groups[b]||[]).push(e);});
  const order=q?["Matches"]:["Today","Yesterday","This week","Earlier"];

  const rail=`<div class="filter-rail">
    <div class="fr-section"><div class="fr-search" id="frWrap">
      ${iSVG("search",13)}<input id="frSearch" placeholder="Search notes" value="${esc(state.entryFilter)}">
      ${state.entryFilter?`<button class="fr-clr" id="frClr">${iSVG("x",12)}</button>`:""}</div></div>
    <div class="fr-section"><div class="fr-eyebrow">Date</div><div class="fr-opts">
      ${[["any","Any time"],["today","Today"],["week","Last 7 days"],["month","Last 30 days"],["older","Older than 30 days"]].map(([id,lbl])=>
        `<button class="fr-opt${state.dateRange===id?" active":""}" data-dr="${id}">${lbl}</button>`).join("")}
    </div></div>
    ${tags.length?`<div class="fr-section"><div class="fr-eyebrow">Tags</div><div class="fr-tags">
      ${tags.map(([t,n])=>`<button class="fr-tag${state.activeTags.includes(t)?" active":""}" data-tag="${t}">
        <span class="hash">#</span>${esc(t)}<span class="n">${n}</span></button>`).join("")}
    </div></div>`:""}
    <div class="fr-foot">
      <div class="fr-count">${hasFilters?`<strong>${filtered.length}</strong> of ${subj.entries.length}`:`${subj.entries.length}`} ${subj.entries.length===1?"note":"notes"}</div>
      ${hasFilters?`<button class="fr-clear-all" id="frClearAll">Clear all</button>`:""}
    </div></div>`;

  let cards="";
  if(filtered.length===0&&hasFilters){
    cards=`<div class="filter-empty">
      <p class="fe-ttl">No notes match your filters.</p>
      <p class="fe-sub">Try a different word or widen the date range.</p>
      <button class="btn btn-ghost" id="feClear">Clear all filters</button></div>`;
  } else {
    order.filter(o=>groups[o]).forEach(o=>{
      cards+=`<div class="day-group"><div class="day-eyebrow">${o}</div>`;
      groups[o].forEach(e=>{
        const snip=highlight(esc(snippetText(e.body||"",q)),q);
        const titleHL=highlight(esc(e.title||"Untitled"),q);
        cards+=`<div class="entry-card" data-eid="${e.id}">
          <div class="ec-head"><span class="ec-date">${fmtDate(e.date)}</span>
          <button class="ec-more">${iSVG("more-horizontal",13)}</button></div>
          <div class="ec-title">${titleHL}</div>
          <div class="ec-body">${snip}</div>
          ${(e.tags||[]).length?`<div class="ec-tags">${e.tags.map(t=>`
            <span class="ec-tag${state.activeTags.includes(t)?" active":""}" data-tag="${t}">
              <span class="hash">#</span>${esc(t)}</span>`).join("")}</div>`:""}
          <div class="ec-footer"><span>${wc(e.body||"")} words</span><span>·</span><span>${readMin(e.body||"")} min read</span></div>
        </div>`;
      });
      cards+=`</div>`;
    });
  }

  pane.innerHTML=`<div class="entry-shell">${rail}<div class="entry-pane">${cards}</div></div>`;
  pane.querySelector("#frSearch")?.addEventListener("input",e=>{state.entryFilter=e.target.value;renderContent();});
  pane.querySelector("#frClr")?.addEventListener("click",()=>{state.entryFilter="";renderContent();});
  pane.querySelectorAll(".fr-opt").forEach(b=>b.addEventListener("click",()=>{state.dateRange=b.dataset.dr;renderContent();}));
  pane.querySelectorAll(".fr-tag").forEach(b=>b.addEventListener("click",()=>{
    const t=b.dataset.tag; state.activeTags=state.activeTags.includes(t)?state.activeTags.filter(x=>x!==t):[...state.activeTags,t];
    renderContent();
  }));
  pane.querySelector("#frClearAll")?.addEventListener("click",()=>{resetFilters();renderContent();});
  pane.querySelector("#feClear")?.addEventListener("click",()=>{resetFilters();renderContent();});
  pane.querySelectorAll(".entry-card").forEach(el=>{
    el.addEventListener("click",e=>{
      if(e.target.closest(".ec-more,.ec-tag")) return;
      state.activeEntryId=el.dataset.eid; state.view="editor"; render();
    });
  });
  pane.querySelectorAll(".ec-tag").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const t=el.dataset.tag;
      state.activeTags=state.activeTags.includes(t)?state.activeTags.filter(x=>x!==t):[...state.activeTags,t];
      renderContent();
    });
  });
}

function renderEditor(pane,subj) {
  const entry=subj.entries.find(e=>e.id===state.activeEntryId);
  if(!entry){state.view="list";renderContent();return;}
  pane.innerHTML=`<div class="editor-wrap">
    <div class="editor-meta">
      <span class="editor-eyebrow">${esc(subj.name)}</span>
      <span class="editor-date">${fmtDate(entry.date)}</span>
      <span class="editor-saved" id="edSaved" style="opacity:0">Saved</span>
    </div>
    <input class="editor-title" id="edTitle" placeholder="Title" value="${esc(entry.title||"")}">
    <div class="editor-tags" id="edTags"></div>
    <div class="editor-toolbar">
      <button class="tb-btn" title="Bold" data-cmd="bold"><span class="tb-glyph"><b>B</b></span></button>
      <button class="tb-btn" title="Italic" data-cmd="italic"><span class="tb-glyph"><i>I</i></span></button>
      <button class="tb-btn" title="Underline" data-cmd="underline"><span class="tb-glyph"><u>U</u></span></button>
      <button class="tb-btn" title="Strikethrough" data-cmd="strikeThrough"><span class="tb-glyph"><s>S</s></span></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Bullet list" data-cmd="insertUnorderedList">${iSVG("list",13)}</button>
      <button class="tb-btn" title="Numbered list" data-cmd="insertOrderedList">${iSVG("list-ordered",13)}</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Heading" id="tbH"><span class="tb-glyph" style="font-family:var(--font-serif);font-weight:500">H</span></button>
      <button class="tb-btn" title="Blockquote" id="tbQ"><span class="tb-glyph" style="font-family:var(--font-serif);font-style:italic;font-size:15px">"</span></button>
      <button class="tb-btn" title="Link" id="tbLink">${iSVG("link",13)}</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Inline code" id="tbIC"><span class="tb-glyph" style="font-family:var(--font-mono);font-size:11px">&lt;&gt;</span></button>
      <button class="tb-btn" title="Code block" id="tbCB">${iSVG("code",13)}</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Clear formatting" data-cmd="removeFormat">${iSVG("remove-formatting",13)}</button>
    </div>
    <div class="editor-body" id="edBody" contenteditable="true" data-ph="Start typing…"></div>
    <div class="editor-actions"><button class="btn btn-ghost" id="edBack">Back to entries</button></div>
  </div>`;

  const body=pane.querySelector("#edBody"), title=pane.querySelector("#edTitle"), saved=pane.querySelector("#edSaved");
  body.innerHTML=entry.body||"";
  attachCopyBtns(body);

  const flash=()=>{saved.style.opacity=1;clearTimeout(statusFade);statusFade=setTimeout(()=>saved.style.opacity=0,1200);};
  const sync=()=>{entry.title=title.value;entry.body=body.innerHTML;saveDebounced();flash();};

  title.addEventListener("input",sync);
  body.addEventListener("input",sync);
  body.addEventListener("blur",sync);

  // Tags
  function renderTags() {
    const tags=entry.tags||[];
    const wrap=pane.querySelector("#edTags");
    wrap.innerHTML=tags.map(t=>`<span class="ed-tag"><span class="hash">#</span>${esc(t)}
      <button class="rm" data-tag="${esc(t)}" title="Remove">×</button></span>`).join("")+
      `<input class="ed-tag-input" id="tagInput" placeholder="add tag…" autocomplete="off" spellcheck="false">
       <span class="ed-tag-hint">Enter or , to add</span>`;
    wrap.querySelectorAll(".rm").forEach(btn=>{
      btn.onclick=()=>{entry.tags=(entry.tags||[]).filter(t=>t!==btn.dataset.tag);saveDebounced();renderTags();};
    });
    const ti=wrap.querySelector("#tagInput");
    ti.addEventListener("keydown",e=>{
      if(e.key==="Enter"||e.key===","||e.key===" "){
        e.preventDefault();
        const val=ti.value.replace(/[, ]+$/,"").replace(/^#/,"").trim().toLowerCase();
        if(val&&!(entry.tags||[]).includes(val)){entry.tags=[...(entry.tags||[]),val];saveDebounced();}
        renderTags(); setTimeout(()=>pane.querySelector("#tagInput")?.focus(),0);
      }
      if(e.key==="Backspace"&&!ti.value&&(entry.tags||[]).length>0){
        entry.tags=entry.tags.slice(0,-1);saveDebounced();renderTags();
        setTimeout(()=>pane.querySelector("#tagInput")?.focus(),0);
      }
    });
  }
  renderTags();

  // Toolbar
  pane.querySelectorAll(".tb-btn[data-cmd]").forEach(btn=>{
    btn.addEventListener("mousedown",e=>e.preventDefault());
    btn.addEventListener("click",()=>{body.focus();document.execCommand(btn.dataset.cmd,false,null);sync();});
  });
  pane.querySelector("#tbH")?.addEventListener("click",()=>{body.focus();document.execCommand("formatBlock",false,"h2");sync();});
  pane.querySelector("#tbQ")?.addEventListener("click",()=>{body.focus();document.execCommand("formatBlock",false,"blockquote");sync();});
  pane.querySelector("#tbLink")?.addEventListener("click",()=>{const url=prompt("Link URL");if(url){body.focus();document.execCommand("createLink",false,url);sync();}});
  pane.querySelector("#tbIC")?.addEventListener("click",()=>{body.focus();const sel=window.getSelection(),txt=sel?.toString()||"code";document.execCommand("insertHTML",false,`<code>${escHtml(txt)}</code>`);sync();});
  pane.querySelector("#tbCB")?.addEventListener("click",()=>{body.focus();const sel=window.getSelection(),txt=sel?.toString()||"// your code here";document.execCommand("insertHTML",false,`<pre><code>${escHtml(txt)}</code></pre><p><br></p>`);sync();setTimeout(()=>attachCopyBtns(body),0);});
  pane.querySelector("#edBack")?.addEventListener("click",()=>{state.view="list";state.activeEntryId=null;render();});
  setTimeout(()=>title.focus(),40);
}

function attachCopyBtns(body){
  body.querySelectorAll("pre").forEach(pre=>{
    if(pre.querySelector(".code-copy")) return;
    const btn=document.createElement("button");
    btn.className="code-copy";btn.textContent="Copy";btn.contentEditable="false";
    btn.onclick=e=>{e.preventDefault();e.stopPropagation();navigator.clipboard?.writeText(pre.querySelector("code")?.textContent||"");btn.textContent="Copied";setTimeout(()=>btn.textContent="Copy",1200);};
    pre.appendChild(btn);
  });
}

// ---- Modal ----
function openModal(){
  document.getElementById("modalInput").value="";
  document.getElementById("modalScrim").style.display="flex";
  setTimeout(()=>document.getElementById("modalInput").focus(),50);
}
function closeModal(){document.getElementById("modalScrim").style.display="none";}
function addSubject(){
  const name=document.getElementById("modalInput").value.trim();
  if(!name) return;
  const s={id:uid(),name,entries:[]};
  state.subjects.push(s);
  state.activeSubjectId=s.id;state.activeEntryId=null;state.view="list";
  saveDebounced(true);closeModal();render();
}

function newEntry(){
  const subj=activeSubject();if(!subj)return;
  const e={id:uid(),date:new Date().toISOString(),title:"",body:"",tags:[]};
  subj.entries.unshift(e);
  state.activeEntryId=e.id;state.view="editor";
  saveDebounced(true);render();
}
function resetFilters(){state.entryFilter="";state.dateRange="any";state.activeTags=[];}
function activeSubject(){return state.subjects.find(s=>s.id===state.activeSubjectId)||null;}

        <input id="modalInput" placeholder="e.g. Linear algebra"></div>
      <div class="m-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addSubject()">Create subject</button>
      </div>
    </div>
  </div>`;
document.getElementById("modalInput").addEventListener("keydown",e=>{if(e.key==="Enter")addSubject();});
init();
</script>
</body>
